on:
  push:
    branches:
      - "main"
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
      - name: build image
        shell: bash
        env:
          QUAY_TOKEN: ${{secrets.QUAY_TOKEN}}
          REGISTRY: "quay.io/cluster-api-provider-kubemark"
          TAG: "latest"
        run: |
          echo $QUAY_TOKEN | docker login -u="cluster-api-provider-kubemark+capk_robot" quay.io --password-stdin
          make docker-build
          make docker-push
